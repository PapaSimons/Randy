name: Build Randy OS System Image
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x build-alpine.sh

      - name: Compile Randy OS RootFS (via Docker)
        run: |
          docker run --privileged --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:3.19 sh -c "apk add alpine-conf tar curl git && ./build-alpine.sh"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Randy OS Base Image
          tag_name: latest
          files: randy-rootfs.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}