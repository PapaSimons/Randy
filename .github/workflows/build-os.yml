name: Build Randy OS Complete Deployment System
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x build-alpine.sh

      - name: Run Unified Build Environment
        run: |
          docker run --privileged --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:3.19 sh -c "apk add alpine-conf tar curl xorriso mtools grub-efi && ./build-alpine.sh"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Randy OS Deployment Suite
          tag_name: latest
          files: randy-os-installer.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}