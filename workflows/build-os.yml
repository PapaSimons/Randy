name: Build Randy OS Installer
on: workflow_dispatch # Allows you to run it manually from the Actions tab , ..

jobs:
  build:
    runs-on: ubuntu-latest # This is a native Intel x86_64 environment!
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Build Script
        run: |
          # Paste the ENTIRE working script we wrote earlier right here.
          # (The one that generates randy-setup.sh, runs the alpine container, 
          # and outputs randy-os-intel.tar and localhost.apkovl.tar.gz)
          bash your-build-script.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Randy-USB-Installer
          path: |
            randy-installer-env/randy-os-intel.tar
            randy-installer-env/localhost.apkovl.tar.gz